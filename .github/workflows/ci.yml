name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

defaults:
  run:
    working-directory: cornell-diary

jobs:
  frontend:
    name: Frontend (typecheck + test + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: cornell-diary/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  rust-test:
    name: Rust unit + integration tests
    needs: frontend
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: diary_db
          POSTGRES_USER: diary_user
          POSTGRES_PASSWORD: change_me_in_dev
        ports:
          - 5435:5432
        options: >-
          --health-cmd "pg_isready -U diary_user -d diary_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgres://diary_user:change_me_in_dev@127.0.0.1:5435/diary_db
      TEST_DATABASE_URL: postgres://diary_user:change_me_in_dev@127.0.0.1:5435/diary_db

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: cornell-diary/src-tauri

      # Tauri 2 needs the GTK / WebKit headers on Linux even for pure
      # `cargo test` runs because the workspace's test-only feature
      # tree pulls in tauri-runtime-wry's Linux deps. Cheaper than
      # adding a `[features] testonly` split.
      - name: Linux WebKit / GTK deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            build-essential

      - name: Cargo test
        working-directory: cornell-diary/src-tauri
        run: cargo test --no-default-features --features postgres

  tauri-build:
    name: Tauri build (${{ matrix.platform }})
    needs: [frontend, rust-test]
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: cornell-diary/pnpm-lock.yaml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: cornell-diary/src-tauri

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Tauri build
        run: pnpm tauri build

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: cornell-diary-${{ matrix.platform }}
          path: |
            cornell-diary/src-tauri/target/release/bundle/**/*.dmg
            cornell-diary/src-tauri/target/release/bundle/**/*.app.tar.gz
            cornell-diary/src-tauri/target/release/bundle/**/*.AppImage
            cornell-diary/src-tauri/target/release/bundle/**/*.msi
          if-no-files-found: warn
